<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperMod Theme Mockup</title>
    <style>
        body {
            background-color: black;
            color: gold;
            font-family: 'Times New Roman', serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: green;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            color: gold;
            text-decoration: none;
            padding: 10px 15px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Blackstone Center</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <div class="content">
        <h2>Our Mission</h2>
        <p>At the Blackstone Center, we strive to deliver the highest quality of service to our community and beyond.</p>
        <h2>Our Values</h2>
        <p>Integrity, Excellence, and Community Engagement.</p>
    </div>
</body>
</html>
